<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão da Copa</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            /* LINK DA IMAGEM DE FUNDO DE TUDO AQUI EMBAIXO */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://img.nsctotal.com.br/wp-content/uploads/2025/12/copa-do-mundo-2026.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Mantém o fundo fixo ao rolar a tela */
            
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .campo {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .placar-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
        }
        .placar-input {
            width: 50px;
            text-align: center;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        .pix-info {
            background-color: #fff9e6;
            border-left: 5px solid #f1c40f;
            padding: 10px;
            margin: 15px 0;
            font-size: 14px;
            border-radius: 3px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #219150;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 Bolão da Copa</h2>
    
    <form id="formBolao">
        <div class="campo">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required placeholder="Digite seu nome completo">
        </div>

        <div class="campo">
            <label>Placar:</label>
            <div class="placar-container">
                <span>🇧🇷 Brasil</span>
                <input type="text" id="placarBrasil" class="placar-input" maxlength="2" required placeholder="0">
                <span>X</span>
                <input type="text" id="placarJapao" class="placar-input" maxlength="2" required placeholder="0">
                <span>🏴󠁧󠁢󠁳󠁣󠁴󠁿 Japão </span>
            </div>
        </div>

        <div class="campo">
            <label>Já fez o pix? R$ 10,00 </label>
            <div class="radio-group">
                <label style="font-weight: normal;"><input type="radio" name="pix" value="Sim" required> Sim</label>
                <label style="font-weight: normal;"><input type="radio" name="pix" value="Não"> Não</label>
            </div>
        </div>

        <div class="pix-info">
            <strong>Chave Pix:</strong> 48984642644 <br>
            <strong>Nome:</strong> Marco Brasil <br>
            <strong>Banco:</strong> Nubank <br>
            <strong>ENVIAR APOSTA ATÉ AS 12:00 - Segunda-Feira</strong> 
        </div>

        <button type="submit" id="btnEnviar">Enviar Aposta</button>
    </form>
    <hr>

<button type="button" id="btnVerApostas">
    👀 Ver Apostas
</button>

<div id="consulta" style="display:none; margin-top:20px;">

    <p><strong>Você já fez sua aposta?</strong></p>

    <label>
        <input type="radio" name="jaApostou" value="sim">
        Sim
    </label>

    <label style="margin-left:15px;">
        <input type="radio" name="jaApostou" value="nao">
        Não
    </label>

    <div id="naoPode" style="display:none; margin-top:15px; color:red;">
        Apenas quem já realizou uma aposta pode visualizar as apostas.
    </div>

    <div id="verificacao" style="display:none; margin-top:15px;">

        <input
            type="text"
            id="nomeConsulta"
            placeholder="Digite o nome usado na aposta">

        <br><br>

        <button type="button" id="confirmarNome">
            Confirmar
        </button>

    </div>

    <div id="resultado" style="margin-top:20px;"></div>

</div>
</div>

<script>
    
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwr6lbS6G4lgejFeYsaenwX1nUK2YCsl2cVelZney0tCr3bjm1P6aWm-_dDYUghlxiyKw/exec";

    document.getElementById('formBolao').addEventListener('submit', function(e) {
        e.preventDefault(); // Impede a página de recarregar
        
        const btn = document.getElementById('btnEnviar');
        btn.innerText = "Enviando...";
        btn.disabled = true;

        // Junta os placares ex: "Brasil 2 x 1 Japão"
        const placarFinal = `Brasil ${document.getElementById('placarBrasil').value} x ${document.getElementById('placarJapao').value} Japão`;
        
        // Monta os dados para enviar
        const dadosFormulario = {
            nome: document.getElementById('nome').value,
            placar: placarFinal,
            pix: document.querySelector('input[name="pix"]:checked').value
        };

        // Envia os dados para a planilha usando o método Fetch
        fetch(URL_SCRIPT, {
            method: 'POST',
            mode: 'no-cors', // Evita erros de bloqueio de segurança local (CORS)
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dadosFormulario)
        })
        .then(() => {
            alert('Aposta enviada com sucesso! Boa sorte! 🇧🇷');
            document.getElementById('formBolao').reset(); // Limpa a tela
            btn.innerText = "Enviar Aposta";
            btn.disabled = false;
        })
        .catch(error => {
            alert('Erro ao enviar aposta. Tente novamente.');
            console.error(error);
            btn.innerText = "Enviar Aposta";
            btn.disabled = false;
        });
    });

    document.getElementById("btnVerApostas").addEventListener("click", function () {

    document.getElementById("consulta").style.display = "block";

});

document.getElementsByName("jaApostou").forEach(radio => {

    radio.addEventListener("change", function(){

        if(this.value=="sim"){

            document.getElementById("verificacao").style.display="block";
            document.getElementById("naoPode").style.display="none";

        }else{

            document.getElementById("verificacao").style.display="none";
            document.getElementById("naoPode").style.display="block";

        }

    });

});

document.getElementById("confirmarNome").addEventListener("click", function(){

    const nome = document.getElementById("nomeConsulta").value;

    fetch(URL_SCRIPT + "?nome=" + encodeURIComponent(nome))

    .then(r=>r.json())

    .then(res=>{

        if(!res.autorizado){

            alert("Nome não encontrado.");

            return;

        }

        let html="<h3>Apostas</h3>";

        html+="<table border='1' cellpadding='5' style='width:100%; border-collapse:collapse;'>";

        html+="<tr><th>Nome</th><th>Placar</th></tr>";

        res.apostas.forEach(a=>{

            html+="<tr>";

            html+="<td>"+a.nome+"</td>";

            html+="<td>"+a.placar+"</td>";

            html+="</tr>";

        });

        html+="</table>";

        document.getElementById("resultado").innerHTML=html;

    });

});
</script>

</body>
</html>
